<!DOCTYPE html>
<html>
<head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
}
.sidebar {
    width: 200px;
    background: #181818;
    border-right: 1px solid #333;
    padding: 16px 0;
    flex-shrink: 0;
}
.sidebar-item {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    color: #aaa;
    border-left: 3px solid transparent;
}
.sidebar-item:hover { background: #252525; color: #e0e0e0; }
.sidebar-item.active {
    background: #252525;
    color: #fff;
    border-left-color: #0078d4;
}
.content {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
}
h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #ccc; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.page-header h2 { margin: 0; }
.page-intro { color: #888; font-size: 12px; margin-bottom: 16px; }
label {
    display: block;
    margin-top: 12px;
    font-size: 13px;
    color: #999;
}
input[type="text"],
input[type="password"],
input[type="number"],
input[type="search"],
input[type="url"],
input[type="email"],
select {
    width: 100%;
    padding: 6px 8px;
    margin-top: 4px;
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 13px;
}
input[type="text"]:focus,
input[type="password"]:focus,
input[type="number"]:focus,
input[type="search"]:focus,
input[type="url"]:focus,
input[type="email"]:focus,
select:focus { outline: none; border-color: #0078d4; }
.btn {
    padding: 6px 16px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
}
.btn:hover { background: #006cbd; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: transparent; color: #e55; border: 1px solid #e55; }
.btn-danger:hover { background: #e55; color: #fff; }
.perm-btns { display: flex; gap: 4px; }
.perm-btn {
    padding: 3px 10px;
    font-size: 11px;
    border: 1px solid #444;
    border-radius: 3px;
    background: #2d2d2d;
    color: #aaa;
    cursor: pointer;
}
.perm-btn:hover { border-color: #666; color: #e0e0e0; }
.perm-btn.active { background: #0078d4; border-color: #0078d4; color: #fff; }
textarea {
    width: 100%;
    padding: 6px 8px;
    margin-top: 4px;
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
    resize: vertical;
    min-height: 60px;
}
textarea:focus { outline: none; border-color: #0078d4; }
.mcp-card {
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 8px;
}
.mcp-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
}
.mcp-card-name { font-weight: 500; font-size: 13px; }
.mcp-card-cmd { color: #888; font-size: 11px; font-family: 'SF Mono', Monaco, monospace; }
.mcp-card-tools { color: #666; font-size: 11px; margin-top: 2px; }
.error-msg { color: #e55; font-size: 12px; margin-top: 8px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #444; border-top-color: #0078d4; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -2px; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
    color: #666;
    font-size: 13px;
    padding: 24px 0;
    text-align: center;
}
.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    margin-bottom: 8px;
    font-size: 13px;
}
.switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
}
.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.switch .slider {
    position: absolute;
    inset: 0;
    background: #444;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
}
.switch .slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
}
.switch input:checked + .slider {
    background: #0078d4;
}
.switch-running input:checked + .slider {
    background: #22c55e;
}
.switch input:checked + .slider::before {
    transform: translateX(16px);
}
.switch input:disabled + .slider {
    opacity: 0.4;
    cursor: default;
}
.svc-card { border: 1px solid #333; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
.svc-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.svc-card-title { font-weight: 500; font-size: 13px; color: #e0e0e0; }
.svc-badge { display: inline-block; padding: 1px 6px; font-size: 10px; border-radius: 3px; margin-left: 6px; }
.svc-badge.ok { color: #22c55e; border: 1px solid #22c55e; }
.svc-badge.offline { color: #888; border: 1px solid #555; }
.svc-badge.err { color: #e55; border: 1px solid #e55; }
.svc-stats { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 12px; color: #ccc; font-size: 13px; }
.svc-stat-label { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.svc-stat-value { font-size: 16px; font-weight: 500; color: #fff; margin-top: 2px; font-variant-numeric: tabular-nums; }
.svc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.svc-table th { text-align: left; padding: 6px 8px; color: #888; font-weight: 500; border-bottom: 1px solid #2a2a2a; }
.svc-table td { padding: 6px 8px; border-bottom: 1px solid #232323; color: #ccc; font-variant-numeric: tabular-nums; }
.svc-table tr.pending td { opacity: 0.4; }
.svc-actions { display: flex; gap: 4px; }
.svc-err { color: #e55; font-size: 12px; margin-top: 8px; }
.svc-empty { color: #666; font-size: 12px; padding: 8px 0; }

/* ---- Service Inspector: manifest-declared resources ---- */
.svc-resource { border: 1px solid #2a2a2a; border-radius: 6px; margin-top: 12px; }
.svc-resource-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; cursor: pointer; background: #181818; border-radius: 6px 6px 0 0; user-select: none; }
.svc-resource-header:hover { background: #1f1f1f; }
.svc-resource-header.closed { border-radius: 6px; }
.svc-resource-title { font-size: 12px; font-weight: 600; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; }
.svc-resource-title .chevron { display: inline-block; width: 10px; margin-right: 6px; transition: transform 0.15s; transform: rotate(-90deg); }
.svc-resource-header.open .svc-resource-title .chevron { transform: rotate(0deg); }
.svc-resource-count { color: #666; font-size: 11px; font-weight: 400; margin-left: 6px; }
.svc-resource-body { padding: 10px 12px 12px; }
.svc-resource-help { color: #777; font-size: 11px; margin-bottom: 8px; }
.svc-resource-empty { color: #666; font-size: 12px; padding: 6px 0; }
.svc-resource-form label { margin-top: 8px; }
.svc-resource-form-actions { margin-top: 14px; display: flex; gap: 8px; }
.svc-resource-error { color: #e55; font-size: 12px; margin-top: 8px; }

/* ---- Service config editor (collapsible schema tree) ---- */
.cfg-chevron { display: inline-block; width: 9px; color: #888; font-size: 9px; transition: transform 0.12s ease; transform: rotate(0deg); flex-shrink: 0; }
.cfg-chevron.open { transform: rotate(90deg); }

/* Section group (object / array / map) */
.cfg-node { margin-top: 6px; }
.cfg-node-head { display: flex; align-items: center; gap: 7px; padding: 7px 10px; background: #1c1c1c; border: 1px solid #303030; border-radius: 6px; cursor: pointer; user-select: none; }
.cfg-node-head:hover { background: #232323; border-color: #3a3a3a; }
.cfg-node-title { font-size: 12px; font-weight: 600; color: #dcdcdc; }
.cfg-node-sub { color: #6f6f6f; font-size: 11px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cfg-badge { margin-left: auto; flex-shrink: 0; background: #333; color: #bbb; font-size: 10px; font-weight: 600; min-width: 18px; text-align: center; padding: 1px 7px; border-radius: 10px; }
.cfg-node-body { margin: 2px 0 4px 9px; padding: 2px 0 4px 14px; border-left: 1px solid #2a2a2a; }

/* Collection item card */
.cfg-item { margin-top: 6px; border: 1px solid #2a2a2a; border-radius: 6px; overflow: hidden; }
.cfg-item-head { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #181818; }
.cfg-item-head:hover { background: #1e1e1e; }
.cfg-item-toggle { display: flex; align-items: center; gap: 7px; cursor: pointer; flex: 1; min-width: 0; }
.cfg-item-title { font-size: 12px; color: #cfcfcf; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cfg-item-remove { flex-shrink: 0; }
.cfg-item-body { padding: 6px 12px 12px; }

.cfg-add { margin-top: 10px; }

/* Key/value repeater (e.g. llama-server flags) */
.cfg-kv { margin-top: 10px; }
.cfg-kv-label { font-size: 12px; color: #aaa; margin-bottom: 2px; }
.cfg-kv-empty { color: #666; font-size: 12px; padding: 2px 0 2px; }
.cfg-kv-row { display: flex; gap: 6px; align-items: center; margin-top: 5px; }
.cfg-kv-row input { margin-top: 0; }
.cfg-kv-key { flex: 0 0 36%; font-family: 'SF Mono', Monaco, monospace; }
.cfg-kv-val { flex: 1; font-family: 'SF Mono', Monaco, monospace; }
.cfg-kv-del { flex-shrink: 0; padding: 4px 9px; }

.cfg-leaf { margin-top: 10px; }
.cfg-leaf > label { display: block; font-size: 12px; color: #aaa; margin-bottom: 1px; }
.cfg-leaf input.cfg-bad, .cfg-leaf textarea.cfg-bad { border-color: #e55; }
.cfg-actions { margin-top: 16px; padding-top: 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; align-items: center; }
.cfg-apply-note { color: #888; font-size: 11px; margin-top: 8px; }

/* ---- Projects tab ---- */
.proj-card { border: 1px solid #333; border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; }
.proj-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.proj-card-name { font-weight: 500; font-size: 13px; color: #e0e0e0; }
.proj-card-path { color: #888; font-size: 11px; font-family: 'SF Mono', Monaco, monospace; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-card-meta { color: #666; font-size: 11px; margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.proj-card-meta span { white-space: nowrap; }
.proj-section { border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px 14px; margin-top: 12px; }
.proj-section-title { font-size: 12px; font-weight: 600; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.proj-section-help { color: #777; font-size: 11px; margin-bottom: 8px; }
.proj-mcp-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #232323; }
.proj-mcp-row:last-child { border-bottom: none; }
.proj-mcp-name { font-size: 12px; color: #ccc; }
.proj-mcp-name.dangling { color: #888; text-decoration: line-through; }
.proj-tool-picker { padding: 8px 0 8px 16px; border-left: 2px solid #333; margin: 4px 0 8px 8px; }
.proj-tool-row { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; font-size: 12px; color: #aaa; }
.proj-tool-row.stale { color: #f59e0b; }
.proj-tool-row input[type=checkbox] { margin-top: 2px; }
.proj-tool-row .desc { font-size: 11px; color: #777; margin-top: 1px; }
.proj-tool-empty { color: #666; font-size: 11px; padding: 4px 0; font-style: italic; }
.proj-token-field { display: flex; gap: 6px; align-items: center; }
.proj-token-field input { flex: 1; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; }
.proj-token-banner { background: #1a3a52; border: 1px solid #0078d4; border-radius: 4px; padding: 8px 12px; margin-top: 8px; font-size: 12px; color: #cde; }
.proj-token-banner code { color: #fff; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 3px; font-family: 'SF Mono', Monaco, monospace; word-break: break-all; }
.proj-template-card { border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px 12px; margin-bottom: 8px; }
.proj-template-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.proj-form-actions { margin-top: 18px; padding-top: 14px; border-top: 1px solid #333; display: flex; gap: 8px; }
.proj-error { color: #e55; font-size: 12px; margin-top: 8px; }
.proj-ok { color: #22c55e; font-size: 12px; margin-top: 8px; }
</style></head>

<div class="content" id="content"></div>

<script>
function ipc(msg) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.ipc)
        window.webkit.messageHandlers.ipc.postMessage(msg);
    else if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(msg);
}
const EXTERNAL_MCPS_INIT = __EXTERNAL_MCPS_JSON__;
const SERVICES_INIT = __SERVICES_JSON__;
const RUNNING_IDS_INIT = __RUNNING_IDS_JSON__;
const PROJECTS_INIT = __PROJECTS_JSON__;
const MCP_TOOL_CACHE_INIT = __MCP_TOOL_CACHE_JSON__;

let state = {
    page: 'services',
    externalMcps: EXTERNAL_MCPS_INIT,
    discovering: false,
    discoveryError: null,
    mcpAddMode: 'form',
    mcpTransport: 'stdio',
    authenticatingMcp: null,
    editingMcpId: null,                 // null = list, 'new' = add form (no edit support yet)
    services: SERVICES_INIT,
    runningServices: RUNNING_IDS_INIT.reduce(function(m, id) { m[id] = true; return m; }, {}),
    editingServiceId: null,             // null = list, 'new' = add form, '<id>' = edit form
    // Service Inspector state. Each snapshot in serviceStatuses carries
    // its own manifest, so we derive button layouts from the snapshot —
    // no separate manifest map to keep in sync.
    serviceStatuses: {},      // serviceId -> ServiceStatusSnapshot
    serviceActionPending: {}, // key "svc|action|rowKey" -> true while in flight
    serviceActionError: {},   // serviceId -> last error string (cleared on next ok)

    // Per-service config editor (manifest.config). The service advertises a
    // file path + a recursive schema; relay ships the raw file text, we parse
    // it into a tree, render forms from the schema, and serialize back on save.
    serviceConfigTree: {},     // svcId -> parsed config object (server truth)
    serviceConfigDraft: {},    // svcId -> edited clone (form binds to this)
    serviceConfigOpen: {},     // svcId -> bool (panel expanded)
    serviceConfigError: {},    // svcId -> string (load/parse/save error)
    serviceConfigPending: {},  // svcId -> bool (op in flight)
    serviceConfigApplyMsg: {}, // svcId -> string ("Restarting…" etc.)
    serviceConfigLoaded: {},   // svcId -> bool (fetched at least once)
    serviceConfigExpanded: {}, // svcId -> { JSON.stringify(path): bool } collapse state per node
    // Rebuilt every inspector render: integer-indexed bindings from a rendered
    // input back to its (svcId, path) into the draft tree, plus the set of
    // json-leaf bindings currently holding unparseable text. Avoids encoding
    // arbitrary map keys into HTML — handlers carry an index, not a path.
    _cfgBind: [],
    _cfgBadJson: {},

    // Projects tab.
    projects: PROJECTS_INIT,
    mcpToolCache: MCP_TOOL_CACHE_INIT,     // mcpId -> [{name, description, category}]
    editingProjectId: null,                 // null = list, 'new' = create form, '<id>' = edit
    projectForm: null,                      // in-flight form values (kept out of state.projects until Save)
    projectFormError: null,
    projectTokenVisible: {},                // id -> bool (eye toggle)
    projectFreshToken: {},                  // id -> plaintext shown once after rotate
    projectSkillRegen: {},                  // id -> { ok, message, t } (last regen result)
    projectError: null,
    rotatingProjectId: null,
};

function showPage(page) {
    state.page = page;
    const pages = ['services', 'mcps', 'projects', 'inspector'];
    document.querySelectorAll('.sidebar-item').forEach((el, i) => {
        el.classList.toggle('active', pages[i] === page);
    });
    render();
}

const JSON_PLACEHOLDER = JSON.stringify({"my-server": {"command": "npx", "args": ["-y", "@example/server"], "env": {"API_KEY": "..."}}}, null, 2);

// render(source) repaints #content. When source === 'push' (IPC-driven),
// skip the repaint if a form for the current tab is open so we don't wipe
// keystrokes mid-edit. User-initiated renders always proceed — tab switches
// and explicit form mutations must always reflect on screen.
function render(source) {
    const el = document.getElementById('content');
    const fromPush = source === 'push';
    if (state.page === 'services') {
        if (fromPush && state.editingServiceId) return;
        el.innerHTML = renderServices();
    } else if (state.page === 'inspector') {
        // Status poller fires render('push') every 2s. Skip the repaint while a
        // config editor is open so it never wipes in-flight keystrokes (a leaf
        // edit mutates the draft without re-rendering; a poll repaint would
        // rebuild the DOM and drop focus + any uncommitted text). User-driven
        // renders (expand/collapse, save/revert) pass no 'push' and proceed.
        if (fromPush && anyConfigEditorOpen()) return;
        el.innerHTML = renderServiceInspector();
    } else if (state.page === 'projects') {
        if (fromPush && state.editingProjectId) return;
        el.innerHTML = renderProjects();
    } else {
        if (fromPush && state.editingMcpId) return;
        el.innerHTML = renderMcpServers();
        const ta = document.getElementById('mcpJson');
        if (ta) ta.placeholder = JSON_PLACEHOLDER;
    }
}

function renderMcpServers() {
    if (state.editingMcpId) return renderMcpForm();

    let html = '<div class="page-header">';
    html += '<h2>MCP Servers</h2>';
    html += '<button class="btn" onclick="newMcp()">+ New MCP Server</button>';
    html += '</div>';
    html += '<p class="page-intro">Add external MCP servers so clients only need to connect to Relay.</p>';

    if (state.externalMcps.length === 0) {
        html += '<div class="empty-state">No external MCP servers configured. Click <strong>+ New MCP Server</strong> to add one.</div>';
        return html;
    }

    for (const mcp of state.externalMcps) {
        // discovered_tools is runtime-only on the Go side (json:"-"), so the
        // live count comes from mcpToolCache — same data, single source.
        const toolCount = (state.mcpToolCache[mcp.id] || []).length;
        const isHTTP = mcp.transport === 'http';
        const authenticating = state.authenticatingMcp === mcp.id;
        html += '<div class="mcp-card">';
        html += '<div class="mcp-card-header">';
        html += `<span class="mcp-card-name">${esc(mcp.display_name)}</span>`;
        html += '<div style="display:flex;gap:4px;align-items:center">';
        if (isHTTP) {
            if (mcp.oauth_state && mcp.oauth_state.access_token) {
                html += '<span style="font-size:11px;color:#22c55e;border:1px solid #22c55e;border-radius:3px;padding:2px 6px">Authenticated</span>';
            } else {
                html += '<span style="font-size:11px;color:#f59e0b;border:1px solid #f59e0b;border-radius:3px;padding:2px 6px">Not authenticated</span>';
            }
        }
        if (mcp.tcc_services && mcp.tcc_services.length > 0) {
            const busy = state.resettingMcpPermissions === mcp.id;
            const label = busy ? 'Resetting…' : 'Reset Permissions';
            html += `<button class="btn btn-sm" onclick="resetMcpPermissions('${esc(mcp.id)}')" ${busy ? 'disabled' : ''}>${label}</button>`;
        }
        html += `<button class="btn btn-sm btn-danger" onclick="removeExternalMcp('${esc(mcp.id)}')">Remove</button>`;
        html += '</div></div>';
        if (isHTTP) {
            html += `<div class="mcp-card-cmd">${esc(mcp.url || '')}</div>`;
            html += '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">';
            html += `<div class="mcp-card-tools" style="margin:0">${toolCount} tool${toolCount !== 1 ? 's' : ''}</div>`;
            if (authenticating) {
                html += '<button class="btn btn-sm" disabled><span class="spinner"></span>Authenticating...</button>';
            } else {
                html += `<button class="btn btn-sm" onclick="authenticateMcp('${esc(mcp.id)}')">Authenticate</button>`;
            }
            html += '</div>';
        } else {
            const cmd = mcp.command || '';
            const cmdDisplay = cmd.length > 40 ? '...' + cmd.slice(-37) : cmd;
            const argsDisplay = mcp.args && mcp.args.length > 0 ? ' ' + mcp.args.join(' ') : '';
            html += `<div class="mcp-card-cmd">${esc(cmdDisplay + argsDisplay)}</div>`;
            html += `<div class="mcp-card-tools">${toolCount} tool${toolCount !== 1 ? 's' : ''}</div>`;
        }
        html += '</div>';
    }
    return html;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


function addExternalMcp() {
    const displayName = document.getElementById('mcpDisplayName').value.trim();
    const command = document.getElementById('mcpCommand').value.trim();
    const argsStr = document.getElementById('mcpArgs').value.trim();
    const envStr = document.getElementById('mcpEnv').value.trim();

    if (!displayName || !command) return;

    const args = argsStr ? argsStr.split(/\s+/) : [];
    const env = {};
    if (envStr) {
        for (const line of envStr.split('\n')) {
            const eq = line.indexOf('=');
            if (eq > 0) {
                env[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
            }
        }
    }

    state.discoveryError = null;
    ipc(JSON.stringify({
        type: 'add_external_mcp',
        display_name: displayName,
        command,
        args,
        env,
    }));
}

function setMcpTransport(transport) {
    state.mcpTransport = transport;

}

function setMcpAddMode(mode) {

    state.discoveryError = null;
    render();
}

function addExternalMcpFromJson() {
    const raw = document.getElementById('mcpJson').value.trim();
    if (!raw) return;

    let parsed;
    try {
        parsed = JSON.parse(raw);
    } catch (e) {
        state.discoveryError = 'Invalid JSON: ' + e.message;
        render();
        return;
    }

    // Expect { "name": { "command": "...", ... } }
    const keys = Object.keys(parsed);
    if (keys.length === 0) {
        state.discoveryError = 'JSON must contain at least one server entry';
        render();
        return;
    }
    if (keys.length > 1) {
        state.discoveryError = 'Only one server entry is supported per import. ' + (keys.length - 1) + ' extra entries were ignored.';
    }

    const name = keys[0];
    const cfg = parsed[name];
    if (!cfg || typeof cfg !== 'object' || !cfg.command) {
        state.discoveryError = 'Entry must have a "command" field';
        render();
        return;
    }

    state.discoveryError = null;
    ipc(JSON.stringify({
        type: 'add_external_mcp',
        display_name: name,
        command: cfg.command,
        args: cfg.args || [],
        env: cfg.env || {},
    }));
}

function addExternalMcpHttp() {
    const displayName = document.getElementById('mcpDisplayName').value.trim();
    const url = document.getElementById('mcpUrl').value.trim();
    if (!displayName || !url) return;

    state.discoveryError = null;
    ipc(JSON.stringify({
        type: 'add_external_mcp',
        display_name: displayName,
        transport: 'http',
        url: url,
    }));
}

// renderMcpPush is the gate for every MCP-tab push handler. List-affecting
// pushes (`bypassForm: false`) honor the form-protect guard so keystrokes
// survive. Form-affecting pushes (`bypassForm: true` — discovery spinner,
// error banner) bypass the guard when the form is open, since the new
// state belongs *inside* the form and the user needs to see it.
function renderMcpPush(bypassForm) {
    if (state.page !== 'mcps') return;
    render(bypassForm && state.editingMcpId ? undefined : 'push');
}

window.onOAuthStarted = function(id) {
    state.authenticatingMcp = id;
    renderMcpPush(false);
};

window.onOAuthComplete = function(id) {
    state.authenticatingMcp = null;
    const mcp = state.externalMcps.find(m => m.id === id);
    if (mcp) {
        if (!mcp.oauth_state) mcp.oauth_state = {};
        mcp.oauth_state.access_token = 'authenticated'; // UI placeholder only
    }
    renderMcpPush(false);
};

window.onOAuthError = function(id, msg) {
    state.authenticatingMcp = null;
    state.discoveryError = 'OAuth failed: ' + msg;
    renderMcpPush(true);
};

window.onDiscoveryStarted = function() {
    state.discovering = true;
    state.discoveryError = null;
    renderMcpPush(true);
};

window.onExternalMcpAdded = function(mcp) {
    state.discovering = false;
    state.discoveryError = null;
    state.externalMcps.push(mcp);
    state.editingMcpId = null; // close form on successful add
    renderMcpPush(false);
};

window.onExternalMcpError = function(msg) {
    state.discovering = false;
    state.discoveryError = msg;
    renderMcpPush(true);
};

window.onExternalMcpRemoved = function(id) {
    state.externalMcps = state.externalMcps.filter(m => m.id !== id);

};

// Reset TCC permissions for an MCP. The backend clears tccutil entries for
// each declared service and re-spawns the MCP with --request-permissions —
// the spawn uses the same exec.Command shape as normal stdio MCP startup so
// TCC attributes the resulting prompts to the same responsible parent (relay
// tray) that the MCP runs under at runtime. The user should approve any
// system dialogs that appear while this is running.
function resetMcpPermissions(id) {
    const mcp = state.externalMcps.find(m => m.id === id);
    if (!mcp) return;
    const services = (mcp.tcc_services || []).join(', ');
    if (!confirm('Reset TCC permissions for "' + mcp.display_name + '"?\n\n' +
        'This clears existing grants for: ' + services + '\n' +
        'Then launches the MCP with --request-permissions to trigger fresh prompts.\n\n' +
        'Approve any system dialogs that appear after clicking OK. Can take up to 60s.')) return;
    state.resettingMcpPermissions = id;
    renderMcpPush(false);
    ipc(JSON.stringify({ type: 'reset_mcp_permissions', id }));
}

window.onMcpPermissionsReset = function(id, result) {
    state.resettingMcpPermissions = null;
    renderMcpPush(false);
    if (!result || !result.ok) {
        alert('Reset failed: ' + (result && result.error ? result.error : 'unknown error'));
        return;
    }
    let summary = 'Reset permissions for bundle ' + result.bundle_id + '\n\n';
    if (result.reset_services && result.reset_services.length) {
        summary += 'Cleared: ' + result.reset_services.join(', ') + '\n\n';
    }
    if (result.skipped_reasons && result.skipped_reasons.length) {
        summary += 'Skipped:\n  ' + result.skipped_reasons.join('\n  ') + '\n\n';
    }
    if (result.spawn_output) {
        summary += '--- MCP --request-permissions output ---\n' + result.spawn_output;
    }
    alert(summary);
};

function svcFormValues() {

    const workingDir = document.getElementById('svcWorkingDir').value.trim();

    if (envStr) {

            if (eq > 0) {
                env[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
            }
        }

    return { displayName, command, args, env, workingDir, autostart, url };

function saveServiceEdit() {
    const v = svcFormValues();
    if (!v.displayName || !v.command) return;

    ipc(JSON.stringify({
        type: 'update_service',
        id: state.editingServiceId,
        display_name: v.displayName,
        command: v.command,
        args: v.args,
        env: v.env,
        working_dir: v.workingDir || null,
        autostart: v.autostart,

    ipc(JSON.stringify({ type: checked ? 'start_service' : 'stop_service', id: id }));

window.onServiceStatus = function(runningIds) {
    var m = {};
    for (var i = 0; i < runningIds.length; i++) m[runningIds[i]] = true;
    state.runningServices = m;
    if (state.page !== 'services') return;
    // Surgically update each toggle in place. A full re-render fires every
    // 2s from the status poller and would wipe text the user is typing into
    // the Add/Edit Service form.
    for (var i = 0; i < state.services.length; i++) {
        var svc = state.services[i];
        var cb = document.querySelector('[data-svc-running="' + svc.id + '"]');
        if (cb) cb.checked = !!m[svc.id];

window.onSettingsError = function(msg) {
    console.error('Settings save error:', msg);

    banner.textContent = 'Failed to save settings: ' + msg;
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:10px;background:#c0392b;color:#fff;text-align:center;z-index:9999;font-size:13px';

window.onSettingsReloaded = function(data) {
    state.externalMcps = data.external_mcps;
    state.services = data.services;
    state.runningServices = data.running_ids.reduce(function(m, id) { m[id] = true; return m; }, {});
    if (data.projects) state.projects = data.projects;
    if (data.mcp_tool_cache) state.mcpToolCache = data.mcp_tool_cache;
    // Push-sourced repaint of the currently visible tab; render() itself
    // skips if a form is mid-edit. Other tabs pick up the fresh state on
    // next switch — no need to repaint them now.
    render('push');
};

window.onProjectsReloaded = function(projects) {
    state.projects = projects || [];
    // External mutation — drop in-flight form edits to avoid showing stale data.
    if (state.editingProjectId && state.editingProjectId !== 'new') {
        const stillExists = state.projects.some(p => p.id === state.editingProjectId);
        if (!stillExists) {
            state.editingProjectId = null;
            state.projectForm = null;
        }
    }
    if (state.page === 'projects') render('push');
};

// ---------------------------------------------------------------------------
// Projects tab — list view + edit form with tri-state tool picker.
//
// State model: a single in-flight `state.projectForm` object holds the user's
// uncommitted edits. Tri-state buttons and tool checkboxes mutate it; Save
// dispatches `update_project` with the entire patch. Push-sourced renders
// (onProjectsReloaded, etc.) pass source='push' so render() can skip the
// repaint while editingProjectId is set, preserving keystrokes mid-edit.
// User-initiated render() calls always proceed (no source arg).
// ---------------------------------------------------------------------------

const PROJ_MCP_WILDCARD = '*';

function renderProjects() {
